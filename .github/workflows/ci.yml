name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libsndfile1

      - name: Install minimal Python deps for lint+test
        # We skip heavy deps (torch, transformers) in CI and rely on stubs.
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest pytest-asyncio pyyaml numpy loguru \
                      rank-bm25 sacrebleu pydantic fastapi

      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

      - name: Black format check
        run: black --check src/ tests/ scripts/

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t adaptive-live-translator:ci .
