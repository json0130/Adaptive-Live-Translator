version: "3.9"

services:
  translator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: adaptive-live-translator:latest
    container_name: alt-server
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - CONFIG_PATH=configs/default.yaml
      - MODEL_CACHE_DIR=/app/models
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../models:/app/models          # model weight cache
      - ../data:/app/data              # glossaries, TM, profiles, adapters
      - ../configs:/app/configs        # override configs at runtime
      - ../logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: Redis for session state in multi-instance deployments
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
